version: "3.9"

services:

  backend:
    build: ./backend
    container_name: statrush_backend
    ports:
      - "5001:5000"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: statrush
      DB_USER: postgres
      DB_PASSWORD: postgres

  frontend:
    build: ./frontend
    container_name: statrush_frontend
    ports:
      - "3001:5173"
    depends_on:
      - backend

  db:
    image: postgres:16
    container_name: statrush
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: statrush
    ports:
      - "5433:5432"   # 👈 CHANGE THIS
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: